name: Bug Report
description: Create a report to help us improve CodeFortress
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output or CLI errors.
      render: shell
  - type: input
    id: version
    attributes:
      label: CodeFortress Version
      description: What version are you running? (e.g., v1.0.0)
    validations:
      required: true
