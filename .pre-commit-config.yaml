repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.7
    hooks:
      - id: trufflehog
        name: TruffleHog Secret Scanner
        description: Detects high-value secrets in commits
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --fail'
        language: system
        stages: [commit]