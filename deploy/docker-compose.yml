version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: cdoc_jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root

  sonarqube:
    image: sonarqube:lts
    container_name: cdoc_sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    volumes:
      - sonarqube_data:/opt/sonarqube/data

  # Simplified DefectDojo Mock for architecture demonstration
  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: cdoc_defectdojo
    ports:
      - "8081:8080"
    environment:
      - DD_SECRET_KEY=mock_secret_key_for_testing

volumes:
  jenkins_data:
  sonarqube_data: